<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="d-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#00a8cc"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="8" y="8" width="496" height="496" rx="88" ry="88" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Cyan accent outline ring (corner highlight) -->
  <rect x="8" y="8" width="496" height="496" rx="88" ry="88" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="60 1500" stroke-dashoffset="-40" opacity="0.4"/>

  <!-- Document sheet behind the D -->
  <g transform="translate(256,256)" opacity="0.1">
    <rect x="-100" y="-130" width="200" height="260" rx="10" ry="10" fill="none" stroke="#00d4ff" stroke-width="3"/>
    <line x1="-60" y1="-80" x2="60" y2="-80" stroke="#00d4ff" stroke-width="3"/>
    <line x1="-60" y1="-40" x2="60" y2="-40" stroke="#00d4ff" stroke-width="3"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#00d4ff" stroke-width="3"/>
    <line x1="-60" y1="40" x2="20" y2="40" stroke="#00d4ff" stroke-width="3"/>
  </g>

  <!-- The "D" letter - main brand element -->
  <g filter="url(#glow)">
    <text
      x="256"
      y="360"
      font-family="'JetBrains Mono', 'Consolas', monospace"
      font-size="320"
      font-weight="700"
      fill="url(#d-grad)"
      text-anchor="middle">D</text>
  </g>

  <!-- Small "oZii" subscript -->
  <text
    x="256"
    y="432"
    font-family="'JetBrains Mono', 'Consolas', monospace"
    font-size="48"
    font-weight="700"
    fill="#00d4ff"
    opacity="0.85"
    text-anchor="middle">oZii</text>
</svg>
