appId: org.hazii.dozii
productName: DoZii
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: DoZii
  icon: resources/icon.ico
  target:
    - nsis
  signAndEditExecutable: false
nsis:
  artifactName: DoZii-Setup-${version}.${ext}
  shortcutName: DoZii
  uninstallDisplayName: DoZii
  createDesktopShortcut: always
  include: build/installer.nsh
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
extraResources:
  - from: resources/
    to: resources/
# Update-Feed fuer electron-updater: oeffentliches Releases-Repo (Code-Repo bleibt privat).
# Gebaut wird mit --publish never; Upload erfolgt manuell via gh release create.
publish:
  provider: github
  owner: haZiinstinct
  repo: DoZii-releases
