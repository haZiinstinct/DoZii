<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="DoZii — Lokale, 100 % offline Dokumentenanalyse mit KI">
  <defs>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#00a8cc"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.5" stop-color="#0a0a0f" stop-opacity="0"/>
      <stop offset="1" stop-color="#06060a" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" rx="24" fill="#0a0a0f"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)"/>
  <rect width="1200" height="320" rx="24" fill="url(#vignette)"/>
  <rect x="1" y="1" width="1198" height="318" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- soft cyan glow behind wordmark -->
  <ellipse cx="600" cy="122" rx="340" ry="118" fill="url(#cyanGlow)"/>

  <!-- wordmark: Do Z ii -->
  <g filter="url(#glow)">
    <text x="600" y="152" text-anchor="middle" font-family="'JetBrains Mono','Consolas',monospace" font-weight="700" font-size="104" letter-spacing="-3">
      <tspan fill="#00d4ff">Do</tspan><tspan fill="#f8fafc">Z</tspan><tspan fill="#00d4ff">ii</tspan>
    </text>
  </g>

  <!-- document / analysis motif under the wordmark -->
  <g filter="url(#glow)" stroke-linecap="round">
    <line x1="500" y1="184" x2="700" y2="184" stroke="#94a3b8" stroke-width="6"/>
    <line x1="500" y1="199" x2="672" y2="199" stroke="#94a3b8" stroke-width="6"/>
    <line x1="500" y1="214" x2="628" y2="214" stroke="url(#cyan)" stroke-width="6"/>
  </g>

  <!-- tagline -->
  <text x="600" y="258" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="25" fill="#e2e8f0">Lokale, 100 % offline Dokumentenanalyse mit KI</text>
  <!-- mono meta -->
  <text x="600" y="291" text-anchor="middle" font-family="'JetBrains Mono','Consolas',monospace" font-size="16" fill="#00d4ff" fill-opacity="0.85" letter-spacing="0.5">// verträge · zeugnisse · bescheide · lokal via ollama</text>
</svg>
